name: Deploy via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: Tipo de deploy
        required: true
        default: quick
        type: choice
        options:
          - quick
          - full

concurrency:
  group: deploy-ftp-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detecta mudanças do Composer
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            composer:
              - 'composer.json'
              - 'composer.lock'

      - name: Setup PHP
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'full') || steps.changes.outputs.composer == 'true' }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install Composer dependencies
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'full') || steps.changes.outputs.composer == 'true' }}
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Limpar idiomas desnecessários (manter pt_BR e en)
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'full') || steps.changes.outputs.composer == 'true' }}
        run: |
          find vendor -type d -name "lang" | while read dir; do
            find "$dir" -mindepth 1 -maxdepth 1 ! -name "pt_BR" ! -name "en" -exec rm -rf {} \;
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Upload rápido (sem vendor)
        if: ${{ !((github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'full') || steps.changes.outputs.composer == 'true') }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          exclude: |
            **/.git/**
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/.env
            **/.env.*
            **/.DS_Store
            **/tests/**
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/debugbar/**

      - name: Upload completo (com vendor)
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'full') || steps.changes.outputs.composer == 'true' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          exclude: |
            **/.git/**
            **/.github/**
            **/node_modules/**
            **/.env
            **/.env.*
            **/.DS_Store
            **/tests/**
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/debugbar/**