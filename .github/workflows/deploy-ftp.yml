name: Deploy via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: Tipo de deploy
        required: true
        default: quick
        type: choice
        options:
          - quick
          - full
          - vendor-only

concurrency:
  group: deploy-ftp-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detecta mudanças do Composer
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            composer:
              - 'composer.json'
              - 'composer.lock'

      - name: Setup PHP
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.deploy_mode == 'full' || inputs.deploy_mode == 'vendor-only')) || steps.changes.outputs.composer == 'true' }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install Composer dependencies
        if: ${{ (github.event_name == 'workflow_dispatch' && (inputs.deploy_mode == 'full' || inputs.deploy_mode == 'vendor-only')) || steps.changes.outputs.composer == 'true' }}
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Limpar idiomas desnecessários
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_mode != 'vendor-only' }}
        run: |
          if [ -d vendor ]; then
            find vendor -type d -name "lang" | while read dir; do
              find "$dir" -mindepth 1 -maxdepth 1 ! -name "pt_BR" ! -name "en" -exec rm -rf {} \;
            done
          fi

      - name: Setup Node.js
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'vendor-only') }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'vendor-only') }}
        run: npm ci

      - name: Build frontend assets
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'vendor-only') }}
        run: npm run build

      # =========================
      # 🚀 DEPLOY NORMAL (ZIP)
      # =========================

      - name: Gerar ZIP rápido (sem vendor)
        if: ${{ !((github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'full') || steps.changes.outputs.composer == 'true' || (github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'vendor-only')) }}
        run: |
          rm -rf deploy-artifacts
          mkdir -p deploy-artifacts
          zip -rq deploy-artifacts/app-deploy.zip . \
            -x ".git/*" ".github/*" "node_modules/*" "vendor/*" ".env" ".env.*" ".DS_Store" \
            "tests/*" "storage/logs/*" "storage/framework/cache/*" "storage/framework/sessions/*" "storage/framework/views/*" "storage/debugbar/*" \
            "deploy-artifacts/*"

      - name: Gerar ZIP completo (com vendor)
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'full') || steps.changes.outputs.composer == 'true' }}
        run: |
          rm -rf deploy-artifacts
          mkdir -p deploy-artifacts
          zip -rq deploy-artifacts/app-deploy.zip . \
            -x ".git/*" ".github/*" "node_modules/*" ".env" ".env.*" ".DS_Store" \
            "tests/*" "storage/logs/*" "storage/framework/cache/*" "storage/framework/sessions/*" "storage/framework/views/*" "storage/debugbar/*" \
            "deploy-artifacts/*"

      - name: Upload ZIP do deploy normal via FTP
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_mode != 'vendor-only' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: deploy-artifacts/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state-app-zip.json
          dangerous-clean-slate: false

      - name: Descompactar deploy normal via SSH
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.deploy_mode != 'vendor-only' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd "${{ secrets.FTP_SERVER_DIR }}"
            unzip -oq app-deploy.zip -d .
            rm -f app-deploy.zip

      # =========================
      # 📦 VENDOR ZIP
      # =========================

      - name: Gerar ZIP da vendor
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'vendor-only' }}
        run: |
          mkdir -p deploy-artifacts
          cd vendor
          zip -rq ../deploy-artifacts/vendor-deploy.zip .

      - name: Upload ZIP da vendor via FTP
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'vendor-only' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: deploy-artifacts/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state-vendor-zip.json
          dangerous-clean-slate: false

      # =========================
      # 🧠 SSH (CORRIGIDO)
      # =========================

      - name: Descompactar vendor via SSH
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_mode == 'vendor-only' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "=== DEBUG ==="
            pwd
            ls -la

            echo "=== Procurando ZIP ==="
            find . -name "vendor-deploy.zip"

            echo "=== Indo pro HOME ==="
            cd ~

            echo "=== Conteúdo HOME ==="
            ls -la

            echo "=== Deploy seguro ==="
            unzip -oq vendor-deploy.zip -d vendor_new || exit 1
            rm -rf vendor
            mv vendor_new vendor
            rm -f vendor-deploy.zip

            echo "=== Finalizado ==="